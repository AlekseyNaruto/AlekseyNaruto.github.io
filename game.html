<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Змейка — исправленная</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace, system-ui;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: #2b2b1f;
            padding: 20px 25px 25px 25px;
            border-radius: 64px 64px 56px 56px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 4px rgba(255, 255, 200, 0.2);
            border-bottom: 6px solid #5a4a2e;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 6px #3e2e1c, 0 12px 28px black;
            background-color: #1e2a1a;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 12px;
            background: #0f0e0a;
            padding: 12px 20px;
            border-radius: 60px;
            box-shadow: inset 0 2px 5px #00000055, 0 5px 10px rgba(0,0,0,0.3);
            font-weight: bold;
        }

        .score-box, .best-box {
            background: #1d2c1a;
            padding: 6px 18px;
            border-radius: 3rem;
            font-size: 1.7rem;
            letter-spacing: 2px;
            color: #b3ffa7;
            text-shadow: 0 0 4px #3eff6e;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 1px 3px #5f8b4c, 0 2px 3px black;
        }

        .score-box span, .best-box span {
            font-size: 0.9rem;
            color: #d4e6b0;
            text-shadow: none;
            margin-right: 8px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #2a2418;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            padding: 8px 24px;
            border-radius: 60px;
            color: #f2e8cf;
            box-shadow: 0 5px 0 #0f0e09;
            cursor: pointer;
            transition: 0.07s linear;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f0e09;
        }

        .restart-btn {
            background: #4a3722;
            color: #ffecb3;
            font-size: 1.3rem;
            padding: 8px 32px;
        }

        .status {
            background: #070603c9;
            backdrop-filter: blur(3px);
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 6px 12px;
            border-radius: 2rem;
            color: #e6f7d4;
            font-family: monospace;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 12px 16px 20px;
            }
            .score-box, .best-box {
                font-size: 1.2rem;
                padding: 4px 12px;
            }
            button {
                font-size: 1.1rem;
                padding: 5px 20px;
            }
            .info-panel {
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="snakeCanvas" width="500" height="500"></canvas>

        <div class="info-panel">
            <div class="score-box"><span>🍎 СЧЁТ</span> <span id="scoreValue">0</span></div>
            <div class="best-box"><span>🏆 РЕКОРД</span> <span id="bestValue">0</span></div>
        </div>

        <div class="controls">
            <button id="restartButton" class="restart-btn">⟳ НОВАЯ ИГРА</button>
        </div>
        <div class="status" id="gameStatusText">▶ ИГРА АКТИВНА</div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        const statusDiv = document.getElementById('gameStatusText');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        
        let snake = [];
        let food = { x: 12, y: 12 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let bestScore = 0;
        let gameLoopId = null;
        let isGameRunning = false;
        let gameSpeed = 120;
        
        try {
            const savedBest = localStorage.getItem('snakeBestScore');
            if(savedBest !== null && !isNaN(parseInt(savedBest))) {
                bestScore = parseInt(savedBest);
                bestSpan.innerText = bestScore;
            }
        } catch(e) { }
        
        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
        }
        
        function generateRandomFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if(snake.length >= totalCells) {
                return null;
            }
            
            const snakeSet = new Set(snake.map(segment => `${segment.x},${segment.y}`));
            let freeCells = [];
            for(let i = 0; i < GRID_SIZE; i++) {
                for(let j = 0; j < GRID_SIZE; j++) {
                    if(!snakeSet.has(`${i},${j}`)) {
                        freeCells.push({ x: i, y: j });
                    }
                }
            }
            if(freeCells.length === 0) return null;
            const randIndex = Math.floor(Math.random() * freeCells.length);
            return freeCells[randIndex];
        }
        
        function updateBestScoreUI() {
            if(score > bestScore) {
                bestScore = score;
                bestSpan.innerText = bestScore;
                try {
                    localStorage.setItem('snakeBestScore', bestScore);
                } catch(e) {}
            }
        }
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
            updateBestScoreUI();
        }
        
        function isCollision(headX, headY, snakeArr) {
            if(headX < 0 || headX >= GRID_SIZE || headY < 0 || headY >= GRID_SIZE) {
                return true;
            }
            for(let i = 0; i < snakeArr.length; i++) {
                if(snakeArr[i].x === headX && snakeArr[i].y === headY) {
                    return true;
                }
            }
            return false;
        }
        
        function gameTick() {
            if(!isGameRunning) return;
            
            direction = nextDirection;
            
            let newHead = { ...snake[0] };
            switch(direction) {
                case 'RIGHT': newHead.x += 1; break;
                case 'LEFT':  newHead.x -= 1; break;
                case 'UP':    newHead.y -= 1; break;
                case 'DOWN':  newHead.y += 1; break;
            }
            
            const willEat = (newHead.x === food.x && newHead.y === food.y);
            
            // ВАЖНО: Сначала создаем новую змейку для проверки
            let newSnake = [newHead, ...snake];
            if(!willEat) {
                newSnake.pop();
            }
            
            // Проверяем столкновение с телом (для случая когда съели — проверяем всю новую змейку)
            // Если не съели — проверяем со второго элемента (голова уже новая)
            let collision = false;
            if(willEat) {
                collision = isCollision(newHead.x, newHead.y, newSnake.slice(1));
            } else {
                collision = isCollision(newHead.x, newHead.y, newSnake.slice(1));
            }
            
            // Проверка стен уже в isCollision
            if(collision || newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                isGameRunning = false;
                if(gameLoopId) {
                    clearInterval(gameLoopId);
                    gameLoopId = null;
                }
                statusDiv.innerHTML = '💀 ИГРА ОКОНЧЕНА. НАЖМИТЕ "НОВАЯ ИГРА" 💀';
                statusDiv.style.color = "#ffb7a7";
                drawGame();
                return;
            }
            
            // Применяем изменения
            snake = newSnake;
            
            if(willEat) {
                score++;
                updateScoreUI();
                const newFood = generateRandomFood();
                if(newFood === null) {
                    isGameRunning = false;
                    if(gameLoopId) {
                        clearInterval(gameLoopId);
                        gameLoopId = null;
                    }
                    statusDiv.innerHTML = '🎉 ПОБЕДА! ВЫ ЗАПОЛНИЛИ ВСЁ ПОЛЕ! 🎉';
                    statusDiv.style.color = "#ffffaa";
                    drawGame();
                    return;
                } else {
                    food = newFood;
                }
            }
            
            drawGame();
        }
        
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#3f5a32';
            ctx.lineWidth = 0.6;
            for(let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            const fx = food.x * CELL_SIZE;
            const fy = food.y * CELL_SIZE;
            ctx.fillStyle = '#e74c2b';
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE/2, fy + CELL_SIZE/2, CELL_SIZE * 0.38, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(fx + CELL_SIZE*0.65, fy + CELL_SIZE*0.35, CELL_SIZE*0.08, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2c3e2b';
            ctx.beginPath();
            ctx.rect(fx + CELL_SIZE*0.45, fy + CELL_SIZE*0.15, CELL_SIZE*0.12, CELL_SIZE*0.1);
            ctx.fill();
            
            for(let i=0; i<snake.length; i++) {
                const seg = snake[i];
                const segX = seg.x * CELL_SIZE;
                const segY = seg.y * CELL_SIZE;
                const margin = 2;
                const radius = 5;
                ctx.beginPath();
                ctx.roundRect(segX + margin/2, segY + margin/2, CELL_SIZE - margin, CELL_SIZE - margin, radius);
                let gradient = ctx.createLinearGradient(segX, segY, segX+CELL_SIZE, segY+CELL_SIZE);
                if(i === 0) {
                    gradient.addColorStop(0, '#6a9c4b');
                    gradient.addColorStop(1, '#3f754a');
                } else {
                    gradient.addColorStop(0, '#548c3c');
                    gradient.addColorStop(1, '#2b5e2a');
                }
                ctx.fillStyle = gradient;
                ctx.fill();
                
                if(i === 0) {
                    ctx.fillStyle = "#f5f9ff";
                    ctx.beginPath();
                    ctx.arc(segX + CELL_SIZE*0.7, segY + CELL_SIZE*0.35, CELL_SIZE*0.12, 0, Math.PI*2);
                    ctx.arc(segX + CELL_SIZE*0.3, segY + CELL_SIZE*0.35, CELL_SIZE*0.12, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#0a0f0a";
                    ctx.beginPath();
                    ctx.arc(segX + CELL_SIZE*0.72, segY + CELL_SIZE*0.33, CELL_SIZE*0.05, 0, Math.PI*2);
                    ctx.arc(segX + CELL_SIZE*0.32, segY + CELL_SIZE*0.33, CELL_SIZE*0.05, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#e05a3a";
                    ctx.beginPath();
                    ctx.moveTo(segX + CELL_SIZE*0.5, segY + CELL_SIZE*0.7);
                    ctx.lineTo(segX + CELL_SIZE*0.45, segY + CELL_SIZE*0.85);
                    ctx.lineTo(segX + CELL_SIZE*0.55, segY + CELL_SIZE*0.85);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "#c8e6a0";
                    ctx.beginPath();
                    ctx.arc(segX + CELL_SIZE*0.8, segY + CELL_SIZE*0.3, CELL_SIZE*0.07, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            if(!isGameRunning) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = `bold ${Math.floor(CELL_SIZE * 1.3)}px "Courier New", monospace`;
                ctx.fillStyle = "#fbd26a";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                let msg = (snake.length === GRID_SIZE*GRID_SIZE) ? "ПОБЕДА!" : "GAME OVER";
                ctx.fillText(msg, canvas.width/2, canvas.height/2);
                ctx.font = `14px monospace`;
                ctx.fillStyle = "#eedd99";
                ctx.fillText("Нажмите НОВАЯ ИГРА", canvas.width/2, canvas.height - 40);
                ctx.textAlign = "left";
            }
            
            ctx.font = "12px monospace";
            ctx.fillStyle = "#cad8a6";
            ctx.fillText("← ↑ ↓ →", canvas.width-70, 20);
        }
        
        if(!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function changeDirection(newDir) {
            if(!isGameRunning) return;
            const opposite = {
                'RIGHT': 'LEFT',
                'LEFT': 'RIGHT',
                'UP': 'DOWN',
                'DOWN': 'UP'
            };
            if(opposite[newDir] === direction) return;
            nextDirection = newDir;
        }
        
        function handleKeydown(e) {
            const key = e.key;
            if(key === 'ArrowUp') { changeDirection('UP'); e.preventDefault(); }
            else if(key === 'ArrowDown') { changeDirection('DOWN'); e.preventDefault(); }
            else if(key === 'ArrowLeft') { changeDirection('LEFT'); e.preventDefault(); }
            else if(key === 'ArrowRight') { changeDirection('RIGHT'); e.preventDefault(); }
            else if(key === ' ' || key === 'Space') {
                if(!isGameRunning) resetGame();
                e.preventDefault();
            }
        }
        
        let touchStartX = 0, touchStartY = 0;
        function handleTouchStart(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchStartX = touch.clientX - rect.left;
            touchStartY = touch.clientY - rect.top;
        }
        
        function handleTouchEnd(e) {
            if(!isGameRunning) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const endX = e.changedTouches[0].clientX - rect.left;
            const endY = e.changedTouches[0].clientY - rect.top;
            const dx = endX - touchStartX;
            const dy = endY - touchStartY;
            if(Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 0) changeDirection('RIGHT');
                else changeDirection('LEFT');
            } else {
                if(dy > 0) changeDirection('DOWN');
                else changeDirection('UP');
            }
        }
        
        function resetGame() {
            if(gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
            initSnake();
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            updateScoreUI();
            isGameRunning = true;
            statusDiv.innerHTML = '🐍 ИГРА АКТИВНА';
            statusDiv.style.color = "#e6f7d4";
            
            const newFood = generateRandomFood();
            if(newFood) food = newFood;
            else food = { x: 5, y: 5 };
            
            drawGame();
            gameLoopId = setInterval(gameTick, gameSpeed);
        }
        
        const restartBtn = document.getElementById('restartButton');
        restartBtn.addEventListener('click', () => resetGame());
        
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
            }
        });
        document.addEventListener('keydown', handleKeydown);
        
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        
        resetGame();
    })();
</script>
</body>
</html>
