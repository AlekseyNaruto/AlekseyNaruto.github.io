<!DOCTYPE html>
<html>
<head><title>Test API</title></head>
<body>
    <h1>Тест GitHub API</h1>
    <button onclick="test()">Проверить</button>
    <pre id="result"></pre>
    
    <script src="js/config.js"></script>
    <script>
    async function test() {
        const url = `https://api.github.com/repos/${window.GITHUB_OWNER}/${window.GITHUB_REPO}`;
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${window.GITHUB_TOKEN}`
            }
        });
        const data = await response.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    }
    </script>
</body>
</html>
