<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кабинет</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">
  <h2>👤 Кабинет</h2>

  <h2>💬 Чат с админом</h2>

<div id="chatBox" style="height:200px;overflow:auto;background:#111;padding:10px;"></div>

<input id="chatInput" placeholder="Сообщение">
<button class="btn" onclick="sendMessage()">Отправить</button>

  <!-- ЗАЯВКА -->
  <form id="appForm">
    <input id="level" placeholder="Уровень">
    <textarea id="msg" placeholder="О себе"></textarea>
    <button class="btn">Подать заявку</button>
  </form>

  <!-- СВЯЗЬ С АДМИНОМ -->
  <h2>📩 Связь с админом</h2>

  <textarea id="complaintText" placeholder="Напиши жалобу или вопрос"></textarea>
  <button class="btn" onclick="sendComplaint()">Отправить</button>

</div>

<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
