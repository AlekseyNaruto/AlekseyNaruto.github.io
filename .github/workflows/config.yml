name: Generate Config
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config
        run: |
          echo "window.GITHUB_CONFIG = {" > js/config.js
          echo "  owner: '${{ github.repository_owner }}'," >> js/config.js
          echo "  repo: '${{ github.event.repository.name }}'," >> js/config.js
          echo "  token: '${{ secrets.GH_TOKEN }}'" >> js/config.js
          echo "};" >> js/config.js
          
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add js/config.js
          git commit -m "Update config" || exit 0
          git push