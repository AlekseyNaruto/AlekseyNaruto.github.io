name: Deploy with Token

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config with secret token
        run: |
          echo "// Auto-generated by GitHub Actions" > js/config.js
          echo "window.GITHUB_CONFIG = {" >> js/config.js
          echo "  owner: '${{ github.repository_owner }}'," >> js/config.js
          echo "  repo: '${{ github.event.repository.name }}'," >> js/config.js
          echo "  token: '${{ secrets.GH_TOKEN }}'" >> js/config.js
          echo "};" >> js/config.js
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./