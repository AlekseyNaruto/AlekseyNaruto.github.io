<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<h2>📥 Заявки</h2>
<div id="apps"></div>

<h2>👥 Состав</h2>
<div id="members"></div>

<h2>🚗 Автопарк</h2>
<input type="file" id="carImage">
<input id="carName" placeholder="Название">
<button class="btn" onclick="addCar()">Добавить</button>
<div id="garage"></div>

<h2>📩 Жалобы</h2>
<div id="complaints"></div>

<h2>📋 Шаблоны</h2>
<input id="templateInput" placeholder="Текст шаблона">
<button class="btn" onclick="addTemplate()">➕</button>
<div id="templates"></div>

<h2>🏆 Лидерборд</h2>
<div id="leaderboard"></div>
<button class="btn" onclick="resetLeaderboard()">Сброс</button>

</div>

<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
